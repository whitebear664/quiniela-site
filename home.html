<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiniela</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --dark: #0a0f0a; --card: #111a11;
    --border: #1e2e1e; --text: #e8f5e9; --muted: #5a7a5a; --red: #ff5252;
    --gold: #ffd500;
  }
  .rotate-msg { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-family: "Barlow", sans-serif; color: var(--muted); text-align: center; padding: 40px; }
  .rotate-msg .icon { font-size: 60px; margin-bottom: 16px; }
  .rotate-msg p { font-size: 16px; letter-spacing: 1px; }
  @media (orientation: landscape) { .rotate-msg { display: flex; } body > *:not(.rotate-msg) { display: none !important; } }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 40px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    position: sticky; top: 0; background: var(--dark); z-index: 10;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .hola { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--text); letter-spacing: 2px; line-height: 1; white-space: nowrap; }
  .hola span { color: var(--green); }
  .logout { font-size: 13px; color: var(--muted); cursor: pointer; padding: 8px; white-space: nowrap; }
  .pool-box { text-align: center; flex: 1; }
  .pool-amount { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: var(--gold); line-height: 1; animation: premioGlow 1.5s ease-in-out infinite; letter-spacing: 2px; }
  @keyframes premioGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(255,213,0,0.6), 0 0 20px rgba(255,213,0,0.3); color: #ffd500; }
    50% { text-shadow: 0 0 20px #ffd500, 0 0 40px #ffd500, 0 0 80px rgba(255,213,0,0.8), 0 0 120px rgba(255,213,0,0.4); color: #fff176; }
  }
  .pool-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .pl {
    display: inline-block;
    color: var(--muted);
    animation: letterGlow 2.7s ease-in-out infinite;
    animation-delay: calc(var(--i) * 0.18s);
  }
  @keyframes letterGlow {
    0%, 100% { color: var(--muted); text-shadow: none; }
    30% { color: #ffe066; text-shadow: 0 0 8px rgba(255,213,0,0.5); }
    50% { color: #ffd500; text-shadow: 0 0 14px rgba(255,213,0,0.9), 0 0 28px rgba(255,213,0,0.4); }
    70% { color: #ffe066; text-shadow: 0 0 8px rgba(255,213,0,0.5); }
  }

  main { padding: 20px; }
  .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

  /* Resultados button */
  .resultados-btn {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,200,83,0.08); border: 1px solid rgba(0,200,83,0.25);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    text-decoration: none; color: var(--text);
  }
  .resultados-btn:active { opacity: 0.8; }
  .resultados-btn-label { font-weight: 600; font-size: 16px; }
  .resultados-btn-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .resultados-arrow { color: var(--green); font-size: 22px; }

  /* Sheet cards */
  .sheet-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .sheet-card:active { opacity: 0.85; }
  .sheet-card.done { opacity: 0.5; cursor: default; }

  /* Gold glow for new unfilled sheets */
  .sheet-card.new-sheet {
    border-color: var(--gold);
    animation: goldGlow 2s ease-in-out infinite;
  }
  @keyframes goldGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(255,213,0,0.3), 0 0 0px rgba(255,213,0,0); border-color: rgba(255,213,0,0.6); }
    50% { box-shadow: 0 0 20px rgba(255,213,0,0.6), 0 0 40px rgba(255,213,0,0.2); border-color: rgba(255,213,0,1); }
  }

  .sheet-name { font-weight: 600; font-size: 17px; }
  .sheet-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .badge { font-size: 12px; padding: 6px 12px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .badge.open { background: rgba(255,213,0,0.15); color: var(--gold); }
  .badge.done-badge { background: rgba(90,122,90,0.2); color: var(--muted); }
  .badge.closed { background: rgba(255,82,82,0.12); color: var(--red); }
  .empty { text-align: center; color: var(--muted); padding: 50px 0; font-size: 14px; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; }
  .overlay.active { display: block; }
  .modal {
    background: var(--card); border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 24px 20px 40px;
    min-height: 50vh; position: absolute; bottom: 0; width: 100%;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; }
  .close-btn { font-size: 28px; cursor: pointer; color: var(--muted); padding: 4px 8px; }

  /* Game rows */
  .game-row {
    background: var(--dark); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .teams-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .team { font-weight: 600; font-size: 15px; }
  .vs-label { font-size: 11px; color: var(--muted); }
  .score-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .score-input {
    width: 64px; height: 56px; background: var(--card); border: 2px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 26px;
    font-family: 'Bebas Neue', sans-serif; text-align: center; outline: none;
    transition: border-color 0.2s;
  }
  .score-input:focus { border-color: var(--green); }
  .score-dash { font-size: 22px; color: var(--muted); font-family: 'Bebas Neue', sans-serif; }

  .submit-btn {
    width: 100%; padding: 18px; background: var(--green); color: #000;
    border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px; cursor: pointer; margin-top: 16px;
  }
  .submit-btn:active { opacity: 0.8; }
  .submit-btn:disabled { opacity: 0.4; }
  .msg { text-align: center; margin-top: 12px; font-size: 14px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }
</style>
</head>
<body>
<div class="rotate-msg"><div class="icon">📱</div><p>Gira tu celular a<br>modo vertical</p></div>

<header>
  <div class="hola">HOLA <span id="username">—</span></div>
  <div class="pool-box">
    <div class="pool-amount" id="pool-amount">$—</div>
    <div class="pool-label" id="premio-label">
      <span class="pl" style="--i:0">E</span><span class="pl" style="--i:1">L</span><span class="pl" style="--i:2"> </span><span class="pl" style="--i:3">P</span><span class="pl" style="--i:4">R</span><span class="pl" style="--i:5">E</span><span class="pl" style="--i:6">M</span><span class="pl" style="--i:7">I</span><span class="pl" style="--i:8">O</span>
    </div>
  </div>
  <div class="logout" onclick="logout()">Salir</div>
</header>

<main>
  <a href="standings.html" class="resultados-btn">
    <div>
      <div class="resultados-btn-label">🏆 Resultados</div>
      <div class="resultados-btn-sub">Puntos y pronósticos de todos</div>
    </div>
    <span class="resultados-arrow">→</span>
  </a>

  <div class="section-title">Quinielas</div>
  <div id="sheets-list"><div class="empty">Cargando...</div></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <div class="close-btn" onclick="closeModal()">×</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const SERVER_URL = "https://quiniela-server-production-183e.up.railway.app";
  const token = localStorage.getItem('q_token');
  const name = localStorage.getItem('q_name');
  if (!token) window.location.href = 'index.html';
  document.getElementById('username').textContent = (name || '—').toUpperCase();

  function logout() { localStorage.clear(); window.location.href = 'index.html'; }
  const headers = () => ({ 'Content-Type':'application/json', 'x-token': token });

  async function loadSheets() {
    try {
      const res = await fetch(`${SERVER_URL}/sheets`, { headers: headers() });
      if (res.status === 401) { logout(); return; }
      const sheets = await res.json();
      const el = document.getElementById('sheets-list');
      if (!sheets.length) { el.innerHTML = '<div class="empty">El admin aún no ha creado quinielas</div>'; return; }

      el.innerHTML = sheets.map(s => {
        // New unfilled open sheet — gold glow
        if (s.open && !s.submitted) {
          return `<div class="sheet-card new-sheet" onclick="openSheet('${s.id}')">
            <div><div class="sheet-name">⚽ ${s.name}</div><div class="sheet-meta">${s.gameCount} partidos · ¡Llena tu quiniela!</div></div>
            <span class="badge open">NUEVO →</span>
          </div>`;
        }
        // Already submitted
        if (s.submitted) {
          return `<div class="sheet-card done">
            <div><div class="sheet-name">${s.name}</div><div class="sheet-meta">${s.gameCount} partidos</div></div>
            <span class="badge done-badge">✓ Enviado</span>
          </div>`;
        }
        // Closed and not submitted
        return `<div class="sheet-card done">
          <div><div class="sheet-name">${s.name}</div><div class="sheet-meta">${s.gameCount} partidos</div></div>
          <span class="badge closed">Cerrado</span>
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('sheets-list').innerHTML = '<div class="empty">Error de conexión</div>';
    }
  }

  async function openSheet(id) {
    const res = await fetch(`${SERVER_URL}/sheet/${id}`, { headers: headers() });
    const sheet = await res.json();
    document.getElementById('modal-title').textContent = sheet.name;
    document.getElementById('overlay').classList.add('active');
    document.body.style.overflow = 'hidden';

    let html = sheet.games.map(g => `
      <div class="game-row">
        <div class="teams-row">
          <span class="team">${g.home}</span>
          <span class="vs-label">VS</span>
          <span class="team">${g.away}</span>
        </div>
        <div class="score-row">
          <input class="score-input" type="number" min="0" max="99" value="" placeholder="" inputmode="numeric" data-game="${g.id}" data-side="home">
          <span class="score-dash">—</span>
          <input class="score-input" type="number" min="0" max="99" value="" placeholder="" inputmode="numeric" data-game="${g.id}" data-side="away">
        </div>
      </div>`).join('');
    html += `<button class="submit-btn" id="submit-btn" onclick="submitGuesses('${id}')">ENVIAR PRONÓSTICOS</button>
             <div class="msg" id="modal-msg"></div>`;
    document.getElementById('modal-body').innerHTML = html;
  }

  async function submitGuesses(sheetId) {
    const inputs = document.querySelectorAll('.score-input');
    const gameGuesses = {};
    let allFilled = true;
    inputs.forEach(inp => {
      const gid = inp.dataset.game, side = inp.dataset.side;
      if (!gameGuesses[gid]) gameGuesses[gid] = {};
      if (inp.value === '') allFilled = false;
      gameGuesses[gid][side] = parseInt(inp.value) || 0;
    });
    const msg = document.getElementById('modal-msg');
    if (!allFilled) { msg.textContent = 'Llena todos los marcadores antes de enviar'; msg.className = 'msg err'; return; }
    document.getElementById('submit-btn').disabled = true;
    const res = await fetch(`${SERVER_URL}/sheet/${sheetId}/guess`, {
      method: 'POST', headers: headers(), body: JSON.stringify({ gameGuesses })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = '✓ Pronósticos enviados'; msg.className = 'msg ok';
      setTimeout(() => { closeModal(); loadSheets(); }, 1500);
    } else {
      msg.textContent = data.error || 'Error al enviar'; msg.className = 'msg err';
      document.getElementById('submit-btn').disabled = false;
    }
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  async function loadPool() {
    try {
      const res = await fetch(`${SERVER_URL}/admin/users`, { headers: headers() });
      // users endpoint requires admin — use leaderboard count instead
      const lb = await fetch(`${SERVER_URL}/standings`);
      const players = await lb.json();
      const total = players.length * 50;
      document.getElementById('pool-amount').textContent = `$${total}`;
    } catch(e) {}
  }

  loadSheets();
  loadPool();
</script>
</body>
</html>
