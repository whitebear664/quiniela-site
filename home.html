<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela – Mis Pronósticos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --dark: #0a0f0a;
    --card: #111a11;
    --border: #1e2e1e;
    --text: #e8f5e9;
    --muted: #5a7a5a;
    --red: #ff5252;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
    background-image:
      radial-gradient(ellipse at 10% 30%, rgba(0,200,83,0.05) 0%, transparent 60%);
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--green); letter-spacing: 3px; }
  .welcome { font-size: 13px; color: var(--muted); }
  .welcome span { color: var(--text); font-weight: 600; }
  .logout { font-size: 12px; color: var(--muted); cursor: pointer; letter-spacing: 1px; }
  .logout:hover { color: var(--red); }

  main { padding: 24px; max-width: 600px; margin: 0 auto; }
  .section-title {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }

  /* Sheet cards */
  .sheet-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .sheet-card:hover { border-color: var(--green); transform: translateY(-1px); }
  .sheet-card.done { border-color: #1a3a1a; opacity: 0.7; cursor: default; }
  .sheet-card.done:hover { transform: none; }
  .sheet-name { font-weight: 600; font-size: 16px; }
  .sheet-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .badge {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    font-weight: 600; letter-spacing: 1px; white-space: nowrap;
  }
  .badge.open { background: rgba(0,200,83,0.15); color: var(--green); }
  .badge.closed { background: rgba(255,82,82,0.12); color: var(--red); }
  .badge.done-badge { background: rgba(90,122,90,0.2); color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }

  /* Modal overlay */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 24px;
  }
  .overlay.active { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 520px;
    margin: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; }
  .close-btn { font-size: 24px; cursor: pointer; color: var(--muted); line-height: 1; }
  .close-btn:hover { color: var(--text); }

  /* Game row */
  .game-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .game-row:last-of-type { border-bottom: none; }
  .team { font-weight: 600; font-size: 14px; }
  .team.home { text-align: right; }
  .team.away { text-align: left; }
  .score-inputs { display: flex; align-items: center; gap: 8px; }
  .score-input {
    width: 44px; height: 44px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 20px;
    font-family: 'Bebas Neue', sans-serif;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .score-input:focus { border-color: var(--green); }
  .score-input:read-only { opacity: 0.6; cursor: not-allowed; }
  .vs { font-size: 12px; color: var(--muted); }

  /* Results mode */
  .result-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto 1fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .result-row:last-of-type { border-bottom: none; }
  .score-box {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    padding: 4px 10px;
    border-radius: 5px;
    text-align: center;
    min-width: 50px;
  }
  .score-box.my-guess { background: #1a2e1a; color: var(--text); }
  .score-box.real { background: rgba(0,200,83,0.15); color: var(--green); }
  .pts-chip {
    font-size: 11px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px; text-align: center; min-width: 36px;
  }
  .pts-3 { background: rgba(0,200,83,0.2); color: var(--green); }
  .pts-1 { background: rgba(255,213,0,0.15); color: #ffd500; }
  .pts-0 { background: rgba(255,82,82,0.1); color: var(--muted); }
  .result-total { text-align: center; margin-top: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--green); }
  .result-total span { font-family: 'Barlow', sans-serif; font-size: 12px; color: var(--muted); display: block; letter-spacing: 2px; text-transform: uppercase; }

  .submit-btn {
    width: 100%; padding: 14px;
    background: var(--green); color: #000;
    border: none; border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
    cursor: pointer; margin-top: 16px;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg { text-align: center; margin-top: 12px; font-size: 13px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">QUINIELA</div>
  <div class="welcome">Hola, <span id="username">—</span></div>
  <div class="logout" onclick="logout()">SALIR</div>
</header>

<main>
  <div class="section-title">Quinielas disponibles</div>
  <div id="sheets-list"><div class="empty">Cargando...</div></div>
</main>

<!-- Sheet modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <div class="close-btn" onclick="closeModal()">×</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const SERVER_URL = "https://YOUR-RAILWAY-SERVER.up.railway.app";
  const token = localStorage.getItem('q_token');
  const name = localStorage.getItem('q_name');

  if (!token) window.location.href = 'index.html';
  document.getElementById('username').textContent = name || '—';

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }

  const headers = () => ({ 'Content-Type':'application/json', 'x-token': token });

  async function loadSheets() {
    try {
      const res = await fetch(`${SERVER_URL}/sheets`, { headers: headers() });
      if (res.status === 401) { logout(); return; }
      const sheets = await res.json();
      const el = document.getElementById('sheets-list');
      if (!sheets.length) { el.innerHTML = '<div class="empty">El admin aún no ha creado quinielas</div>'; return; }
      el.innerHTML = sheets.map(s => {
        let badge, clickable = false;
        if (s.hasResults && s.submitted) {
          badge = '<span class="badge done-badge">Ver Resultados</span>';
          clickable = true;
        } else if (s.submitted) {
          badge = '<span class="badge done-badge">✓ Enviado</span>';
          clickable = false;
        } else if (s.open) {
          badge = '<span class="badge open">Abierto</span>';
          clickable = true;
        } else {
          badge = '<span class="badge closed">Cerrado</span>';
          clickable = false;
        }
        const cardClass = (!clickable) ? 'sheet-card done' : 'sheet-card';
        const onclick = clickable ? `onclick="openSheet('${s.id}','${s.hasResults && s.submitted ? 'results' : 'fill'}')"` : '';
        return `<div class="${cardClass}" ${onclick}>
          <div>
            <div class="sheet-name">${s.name}</div>
            <div class="sheet-meta">${s.gameCount} partidos</div>
          </div>
          ${badge}
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('sheets-list').innerHTML = '<div class="empty">Error de conexión</div>';
    }
  }

  async function openSheet(id, mode) {
    const res = await fetch(`${SERVER_URL}/sheet/${id}`, { headers: headers() });
    const sheet = await res.json();
    document.getElementById('modal-title').textContent = sheet.name;
    document.getElementById('overlay').classList.add('active');

    if (mode === 'results') {
      const rres = await fetch(`${SERVER_URL}/sheet/${id}/results`, { headers: headers() });
      const rdata = await rres.json();
      let html = rdata.breakdown.map(r => {
        const pts = r.points;
        const guessStr = r.guess ? `${r.guess.home} – ${r.guess.away}` : '? – ?';
        const resultStr = r.result ? `${r.result.home} – ${r.result.away}` : '? – ?';
        const chipClass = pts === 3 ? 'pts-3' : pts === 1 ? 'pts-1' : 'pts-0';
        return `<div class="result-row">
          <div style="text-align:right;font-weight:600;font-size:13px">${r.game.home}</div>
          <div class="score-box my-guess">${guessStr}</div>
          <div class="pts-chip ${chipClass}">${pts}pt</div>
          <div class="score-box real">${resultStr}</div>
          <div style="font-weight:600;font-size:13px">${r.game.away}</div>
        </div>`;
      }).join('');
      html += `<div class="result-total">${rdata.total}<span>puntos totales</span></div>`;
      document.getElementById('modal-body').innerHTML = html;
      return;
    }

    // Fill mode
    const myGuess = sheet.myGuess || {};
    let html = sheet.games.map(g => {
      const gh = myGuess[g.id]?.home ?? '';
      const ga = myGuess[g.id]?.away ?? '';
      return `<div class="game-row" data-id="${g.id}">
        <div class="team home">${g.home}</div>
        <div class="score-inputs">
          <input class="score-input" type="number" min="0" max="99" value="${gh}" placeholder="0" data-game="${g.id}" data-side="home">
          <span class="vs">–</span>
          <input class="score-input" type="number" min="0" max="99" value="${ga}" placeholder="0" data-game="${g.id}" data-side="away">
        </div>
        <div class="team away">${g.away}</div>
      </div>`;
    }).join('');
    html += `<button class="submit-btn" id="submit-btn" onclick="submitGuesses('${id}')">ENVIAR PRONÓSTICOS</button>
             <div class="msg" id="modal-msg"></div>`;
    document.getElementById('modal-body').innerHTML = html;
  }

  async function submitGuesses(sheetId) {
    const inputs = document.querySelectorAll('.score-input');
    const gameGuesses = {};
    let allFilled = true;
    inputs.forEach(inp => {
      const gid = inp.dataset.game;
      const side = inp.dataset.side;
      if (!gameGuesses[gid]) gameGuesses[gid] = {};
      if (inp.value === '') allFilled = false;
      gameGuesses[gid][side] = parseInt(inp.value) || 0;
    });

    const msg = document.getElementById('modal-msg');
    if (!allFilled) {
      msg.textContent = 'Llena todos los marcadores antes de enviar';
      msg.className = 'msg err';
      return;
    }

    document.getElementById('submit-btn').disabled = true;
    const res = await fetch(`${SERVER_URL}/sheet/${sheetId}/guess`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ gameGuesses })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = '✓ Pronósticos enviados correctamente';
      msg.className = 'msg ok';
      document.getElementById('submit-btn').disabled = true;
      setTimeout(() => { closeModal(); loadSheets(); }, 1500);
    } else {
      msg.textContent = data.error || 'Error al enviar';
      msg.className = 'msg err';
      document.getElementById('submit-btn').disabled = false;
    }
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
  }

  loadSheets();
</script>
</body>
</html>
