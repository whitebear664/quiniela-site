<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiniela</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --dark: #0a0f0a; --card: #111a11;
    --border: #1e2e1e; --text: #e8f5e9; --muted: #5a7a5a; --red: #ff5252;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 40px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--dark); z-index: 10;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--green); letter-spacing: 3px; }
  .welcome { font-size: 13px; color: var(--muted); }
  .welcome span { color: var(--text); font-weight: 600; }
  .logout { font-size: 13px; color: var(--muted); cursor: pointer; padding: 8px; }

  main { padding: 20px; }
  .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

  .sheet-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    cursor: pointer; transition: border-color 0.2s;
    -webkit-tap-highlight-color: rgba(0,200,83,0.1);
  }
  .sheet-card:active { border-color: var(--green); }
  .sheet-card.done { opacity: 0.6; cursor: default; }
  .sheet-name { font-weight: 600; font-size: 17px; }
  .sheet-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .badge { font-size: 12px; padding: 6px 12px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .badge.open { background: rgba(0,200,83,0.15); color: var(--green); }
  .badge.closed { background: rgba(255,82,82,0.12); color: var(--red); }
  .badge.done-badge { background: rgba(90,122,90,0.2); color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 50px 0; font-size: 14px; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; }
  .overlay.active { display: block; }
  .modal {
    background: var(--card); border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 24px 20px 40px;
    min-height: 50vh; position: absolute; bottom: 0; width: 100%;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; }
  .close-btn { font-size: 28px; cursor: pointer; color: var(--muted); padding: 4px 8px; }

  /* Game rows - mobile optimized */
  .game-row {
    background: var(--dark); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .teams-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .team { font-weight: 600; font-size: 15px; }
  .vs-label { font-size: 11px; color: var(--muted); }
  .score-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .score-input {
    width: 64px; height: 56px; background: var(--card); border: 2px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 26px;
    font-family: 'Bebas Neue', sans-serif; text-align: center; outline: none;
    transition: border-color 0.2s;
  }
  .score-input:focus { border-color: var(--green); }
  .score-dash { font-size: 22px; color: var(--muted); font-family: 'Bebas Neue', sans-serif; }

  /* Results */
  .result-card {
    background: var(--dark); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
  }
  .result-teams { display: flex; justify-content: space-between; font-weight: 600; font-size: 14px; margin-bottom: 10px; }
  .scores-row { display: flex; align-items: center; justify-content: space-between; }
  .score-box { font-family: 'Bebas Neue', sans-serif; font-size: 20px; padding: 6px 14px; border-radius: 8px; text-align: center; }
  .score-box.my { background: #1a2e1a; }
  .score-box.real { background: rgba(0,200,83,0.15); color: var(--green); }
  .score-label { font-size: 10px; color: var(--muted); text-align: center; margin-top: 3px; letter-spacing: 1px; }
  .pts-chip { font-size: 15px; font-weight: 700; padding: 6px 14px; border-radius: 20px; }
  .pts-3 { background: rgba(0,200,83,0.2); color: var(--green); }
  .pts-1 { background: rgba(255,213,0,0.15); color: #ffd500; }
  .pts-0 { background: rgba(255,82,82,0.1); color: var(--muted); }
  .total-box { text-align: center; padding: 20px; margin-top: 8px; }
  .total-num { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: var(--green); line-height: 1; }
  .total-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  .submit-btn {
    width: 100%; padding: 18px; background: var(--green); color: #000;
    border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px; cursor: pointer; margin-top: 16px;
  }
  .submit-btn:active { opacity: 0.8; }
  .submit-btn:disabled { opacity: 0.4; }
  .msg { text-align: center; margin-top: 12px; font-size: 14px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">QUINIELA</div>
  <div class="welcome">Hola, <span id="username">—</span></div>
  <div class="logout" onclick="logout()">Salir</div>
</header>

<main>
  <div class="section-title">Quinielas</div>
  <div id="sheets-list"><div class="empty">Cargando...</div></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <div class="close-btn" onclick="closeModal()">×</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const SERVER_URL = "https://quiniela-server-production-183e.up.railway.app";
  const token = localStorage.getItem('q_token');
  const name = localStorage.getItem('q_name');
  if (!token) window.location.href = 'index.html';
  document.getElementById('username').textContent = name || '—';

  function logout() { localStorage.clear(); window.location.href = 'index.html'; }
  const headers = () => ({ 'Content-Type':'application/json', 'x-token': token });

  async function loadSheets() {
    try {
      const res = await fetch(`${SERVER_URL}/sheets`, { headers: headers() });
      if (res.status === 401) { logout(); return; }
      const sheets = await res.json();
      const el = document.getElementById('sheets-list');
      if (!sheets.length) { el.innerHTML = '<div class="empty">El admin aún no ha creado quinielas</div>'; return; }
      el.innerHTML = sheets.map(s => {
        let badge, clickable = false;
        if (s.hasResults && s.submitted) {
          badge = '<span class="badge done-badge">Ver Resultados →</span>'; clickable = true;
        } else if (s.submitted) {
          badge = '<span class="badge done-badge">✓ Enviado</span>';
        } else if (s.open) {
          badge = '<span class="badge open">Llenar →</span>'; clickable = true;
        } else {
          badge = '<span class="badge closed">Cerrado</span>';
        }
        const cls = !clickable ? 'sheet-card done' : 'sheet-card';
        const click = clickable ? `onclick="openSheet('${s.id}','${s.hasResults && s.submitted ? 'results' : 'fill'}')"` : '';
        return `<div class="${cls}" ${click}>
          <div><div class="sheet-name">${s.name}</div><div class="sheet-meta">${s.gameCount} partidos</div></div>
          ${badge}
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('sheets-list').innerHTML = '<div class="empty">Error de conexión</div>';
    }
  }

  async function openSheet(id, mode) {
    const res = await fetch(`${SERVER_URL}/sheet/${id}`, { headers: headers() });
    const sheet = await res.json();
    document.getElementById('modal-title').textContent = sheet.name;
    document.getElementById('overlay').classList.add('active');
    document.body.style.overflow = 'hidden';

    if (mode === 'results') {
      const rres = await fetch(`${SERVER_URL}/sheet/${id}/results`, { headers: headers() });
      const rdata = await rres.json();
      let html = rdata.breakdown.map(r => {
        const pts = r.points;
        const guessStr = r.guess ? `${r.guess.home}–${r.guess.away}` : '?–?';
        const resultStr = r.result ? `${r.result.home}–${r.result.away}` : '?–?';
        const chipClass = pts === 3 ? 'pts-3' : pts === 1 ? 'pts-1' : 'pts-0';
        return `<div class="result-card">
          <div class="result-teams"><span>${r.game.home}</span><span>${r.game.away}</span></div>
          <div class="scores-row">
            <div><div class="score-box my">${guessStr}</div><div class="score-label">Tu pronóstico</div></div>
            <div class="pts-chip ${chipClass}">${pts} pt</div>
            <div><div class="score-box real">${resultStr}</div><div class="score-label">Resultado</div></div>
          </div>
        </div>`;
      }).join('');
      html += `<div class="total-box"><div class="total-num">${rdata.total}</div><div class="total-label">puntos totales</div></div>`;
      document.getElementById('modal-body').innerHTML = html;
      return;
    }

    const myGuess = sheet.myGuess || {};
    let html = sheet.games.map(g => {
      const gh = myGuess[g.id]?.home ?? '';
      const ga = myGuess[g.id]?.away ?? '';
      return `<div class="game-row">
        <div class="teams-row">
          <span class="team">${g.home}</span>
          <span class="vs-label">VS</span>
          <span class="team">${g.away}</span>
        </div>
        <div class="score-row">
          <input class="score-input" type="number" min="0" max="99" value="${gh}" placeholder="0" inputmode="numeric" data-game="${g.id}" data-side="home">
          <span class="score-dash">—</span>
          <input class="score-input" type="number" min="0" max="99" value="${ga}" placeholder="0" inputmode="numeric" data-game="${g.id}" data-side="away">
        </div>
      </div>`;
    }).join('');
    html += `<button class="submit-btn" id="submit-btn" onclick="submitGuesses('${id}')">ENVIAR PRONÓSTICOS</button>
             <div class="msg" id="modal-msg"></div>`;
    document.getElementById('modal-body').innerHTML = html;
  }

  async function submitGuesses(sheetId) {
    const inputs = document.querySelectorAll('.score-input');
    const gameGuesses = {};
    let allFilled = true;
    inputs.forEach(inp => {
      const gid = inp.dataset.game, side = inp.dataset.side;
      if (!gameGuesses[gid]) gameGuesses[gid] = {};
      if (inp.value === '') allFilled = false;
      gameGuesses[gid][side] = parseInt(inp.value) || 0;
    });
    const msg = document.getElementById('modal-msg');
    if (!allFilled) { msg.textContent = 'Llena todos los marcadores'; msg.className = 'msg err'; return; }
    document.getElementById('submit-btn').disabled = true;
    const res = await fetch(`${SERVER_URL}/sheet/${sheetId}/guess`, {
      method: 'POST', headers: headers(), body: JSON.stringify({ gameGuesses })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = '✓ Pronósticos enviados'; msg.className = 'msg ok';
      setTimeout(() => { closeModal(); loadSheets(); }, 1500);
    } else {
      msg.textContent = data.error || 'Error al enviar'; msg.className = 'msg err';
      document.getElementById('submit-btn').disabled = false;
    }
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  loadSheets();
</script>
</body>
</html>
