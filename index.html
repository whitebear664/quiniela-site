<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --dark: #0a0f0a;
    --card: #111a11;
    --border: #1e2e1e;
    --text: #e8f5e9;
    --muted: #5a7a5a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,200,83,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,200,83,0.04) 0%, transparent 50%);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 6px;
    color: var(--green);
    text-shadow: 0 0 40px rgba(0,200,83,0.4);
    line-height: 1;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
  }

  /* Leaderboard */
  .leaderboard {
    width: 100%;
    max-width: 380px;
    margin-bottom: 32px;
  }
  .lb-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    text-align: center;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    animation: fadeUp 0.4s both;
  }
  .lb-row:nth-child(2) { animation-delay: 0.05s; }
  .lb-row:nth-child(3) { animation-delay: 0.1s; }
  .lb-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    width: 28px;
    text-align: center;
  }
  .lb-row:nth-child(2) .lb-rank { color: #FFD700; }
  .lb-row:nth-child(3) .lb-rank { color: #C0C0C0; }
  .lb-row:nth-child(4) .lb-rank { color: #CD7F32; }
  .lb-name { flex: 1; font-weight: 600; font-size: 15px; }
  .lb-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--green);
  }
  .lb-pts-label { font-size: 10px; color: var(--muted); margin-left: 2px; }
  .lb-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 16px; }

  /* Login form */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 380px;
  }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--green); }
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .error { color: #ff5252; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  .admin-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 1px;
  }
  .admin-link:hover { color: var(--green); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="logo">QUINIELA</div>
<div class="subtitle">Mundial 2026</div>

<div class="leaderboard">
  <div class="lb-title">🏆 Top 3 Líderes</div>
  <div id="lb-list"><div class="lb-empty">Aún no hay puntos</div></div>
</div>

<div class="card">
  <div class="field">
    <label>ID</label>
    <input type="text" id="user-id" placeholder="Tu número de ID" autocomplete="off">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn" onclick="login()">ENTRAR</button>
  <div class="error" id="error-msg">ID o contraseña incorrectos</div>
</div>

<a href="admin.html" class="admin-link">Admin ›</a>

<script>
  const SERVER_URL = "https://YOUR-RAILWAY-SERVER.up.railway.app";

  async function loadLeaderboard() {
    try {
      const res = await fetch(`${SERVER_URL}/leaderboard`);
      const data = await res.json();
      const medals = ['🥇','🥈','🥉'];
      const el = document.getElementById('lb-list');
      if (!data.length) { el.innerHTML = '<div class="lb-empty">Aún no hay puntos</div>'; return; }
      el.innerHTML = data.map((p, i) => `
        <div class="lb-row">
          <span class="lb-rank">${medals[i] || (i+1)}</span>
          <span class="lb-name">${p.name}</span>
          <span class="lb-pts">${p.points}<span class="lb-pts-label">pts</span></span>
        </div>`).join('');
    } catch(e) {}
  }

  async function login() {
    const id = document.getElementById('user-id').value.trim();
    const pw = document.getElementById('password').value;
    const err = document.getElementById('error-msg');
    err.style.display = 'none';
    if (!id || !pw) return;
    try {
      const res = await fetch(`${SERVER_URL}/login`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ id, password: pw })
      });
      const data = await res.json();
      if (!res.ok) { err.style.display = 'block'; return; }
      localStorage.setItem('q_token', data.token);
      localStorage.setItem('q_name', data.name);
      localStorage.setItem('q_id', id);
      window.location.href = 'home.html';
    } catch(e) {
      err.style.display = 'block';
      err.textContent = 'Error de conexión';
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  loadLeaderboard();
</script>
</body>
</html>
