<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiniela</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --dark: #0a0f0a; --card: #111a11;
    --border: #1e2e1e; --text: #e8f5e9; --muted: #5a7a5a;
  }
  .rotate-msg { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-family: "Barlow", sans-serif; color: var(--muted); text-align: center; padding: 40px; }
  .rotate-msg .icon { font-size: 60px; margin-bottom: 16px; }
  .rotate-msg p { font-size: 16px; letter-spacing: 1px; }
  @media (orientation: landscape) { .rotate-msg { display: flex; } body > *:not(.rotate-msg) { display: none !important; } }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px;
    background-image: radial-gradient(ellipse at 50% 20%, rgba(0,200,83,0.07) 0%, transparent 60%);
  }
  .subtitle {
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 88px;
    letter-spacing: 4px; color: var(--green);
    text-shadow: 0 0 40px rgba(0,200,83,0.4);
    line-height: 1; margin-bottom: 48px;
  }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px 20px; width: 100%; max-width: 420px; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input {
    width: 100%; background: var(--dark); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; color: var(--text);
    font-family: 'Barlow', sans-serif; font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--green); }
  .btn {
    width: 100%; padding: 16px; background: var(--green); color: #000;
    border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px; cursor: pointer; margin-top: 4px;
  }
  .btn:active { opacity: 0.8; }
  .error { color: #ff5252; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  .admin-link { display: block; text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); text-decoration: none; letter-spacing: 1px; padding: 8px; }
</style>
</head>
<body>
<div class="rotate-msg"><div class="icon">📱</div><p>Gira tu celular a<br>modo vertical</p></div>

<div class="subtitle">Quiniela</div>
<div class="logo">MUNDIAL 2026</div>

<div class="card">
  <div class="field">
    <label>ID</label>
    <input type="text" id="user-id" placeholder="Tu número de ID" autocomplete="off">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn" onclick="login()">ENTRAR</button>
  <div class="error" id="error-msg">ID o contraseña incorrectos</div>
</div>

<a href="admin.html" class="admin-link">Admin ›</a>

<script>
  const SERVER_URL = "https://quiniela-server-production-183e.up.railway.app";

  async function login() {
    const id = document.getElementById('user-id').value.trim();
    const pw = document.getElementById('password').value;
    const err = document.getElementById('error-msg');
    err.style.display = 'none';
    if (!id || !pw) return;
    try {
      const res = await fetch(`${SERVER_URL}/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ id, password: pw })
      });
      const data = await res.json();
      if (!res.ok) { err.style.display = 'block'; return; }
      localStorage.setItem('q_token', data.token);
      localStorage.setItem('q_name', data.name);
      localStorage.setItem('q_id', id);
      window.location.href = 'home.html';
    } catch(e) { err.style.display = 'block'; err.textContent = 'Error de conexión'; }
  }

  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
