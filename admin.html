<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiniela – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --dark: #0a0f0a; --card: #111a11;
    --border: #1e2e1e; --text: #e8f5e9; --muted: #5a7a5a;
    --red: #ff5252; --yellow: #ffd500;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 60px; }

  #login-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px;
  }
  .admin-logo { font-family: 'Bebas Neue', sans-serif; font-size: 60px; color: var(--green); letter-spacing: 4px; margin-bottom: 4px; }
  .admin-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 32px; }

  #app-screen { display: none; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--dark); z-index: 10;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green); letter-spacing: 2px; }
  .logout { font-size: 13px; color: var(--muted); cursor: pointer; padding: 8px; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab {
    padding: 14px 16px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px; white-space: nowrap; flex: 1; text-align: center;
  }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .tab-content { display: none; padding: 20px; }
  .tab-content.active { display: block; }

  .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }

  label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  input {
    width: 100%; background: var(--dark); border: 1px solid var(--border);
    border-radius: 8px; padding: 13px 14px; color: var(--text);
    font-family: 'Barlow', sans-serif; font-size: 16px; outline: none;
  }
  input:focus { border-color: var(--green); }

  .btn {
    padding: 14px 18px; border: none; border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px;
    cursor: pointer; transition: opacity 0.2s; width: 100%; margin-top: 14px;
  }
  .btn:active { opacity: 0.8; }
  .btn-green { background: var(--green); color: #000; }
  .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-yellow { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); }
  .btn-muted { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-sm { padding: 10px 14px; font-size: 14px; width: auto; margin-top: 0; }
  .msg { font-size: 13px; margin-top: 10px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }

  /* Game builder */
  .game-entry { margin-bottom: 12px; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .game-entry-row { display: flex; gap: 8px; align-items: center; }
  .game-entry-row input { flex: 1; }
  .remove-game { background: none; border: none; color: var(--red); font-size: 22px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
  .add-game-btn {
    background: none; border: 1px dashed var(--border); border-radius: 8px;
    color: var(--muted); padding: 14px; width: 100%; cursor: pointer;
    font-family: 'Barlow', sans-serif; font-size: 14px; margin-top: 8px;
  }

  /* Sheet row */
  .sheet-row { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .sheet-row:last-child { border-bottom: none; }
  .sheet-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .sheet-name-admin { font-weight: 600; font-size: 16px; }
  .sheet-meta-admin { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .badge.open { background: rgba(0,200,83,0.15); color: var(--green); }
  .badge.closed { background: rgba(255,82,82,0.1); color: var(--red); }
  .sheet-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  /* User row */
  .user-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .user-row:last-child { border-bottom: none; }
  .user-name { font-weight: 600; font-size: 15px; }
  .user-id { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Leaderboard */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 26px; width: 32px; }
  .lb-pts { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--green); margin-left: auto; }

  /* Results modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; overflow-y: auto; }
  .overlay.active { display: block; }
  .modal { background: var(--card); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; min-height: 50vh; position: absolute; bottom: 0; width: 100%; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
  .close-btn { font-size: 28px; cursor: pointer; color: var(--muted); padding: 4px 8px; }

  /* Results entry */
  .result-game { background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
  .result-game-name { font-weight: 600; font-size: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .result-scores { display: flex; align-items: center; gap: 10px; }
  .result-scores input { text-align: center; font-size: 20px; font-family: 'Bebas Neue', sans-serif; height: 50px; }
  .result-scores span { color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 20px; }

  /* Master table */
  .master-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 400px; }
  th { text-align: left; color: var(--muted); font-weight: 400; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 8px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .pts-3 { color: var(--green); font-family: 'Bebas Neue', sans-serif; font-size: 16px; }
  .pts-1 { color: var(--yellow); font-family: 'Bebas Neue', sans-serif; font-size: 16px; }
  .pts-0 { color: var(--muted); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="admin-logo">ADMIN</div>
  <div class="admin-sub">Quiniela Mundial 2026</div>
  <div class="card" style="max-width:380px;width:100%">
    <label>Contraseña admin</label>
    <input type="password" id="admin-pw" placeholder="••••••••">
    <button class="btn btn-green" onclick="adminLogin()">ENTRAR</button>
    <div class="msg err" id="admin-err" style="display:none">Contraseña incorrecta</div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="logo">ADMIN — QUINIELA</div>
    <div class="logout" onclick="adminLogout()">Salir</div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('sheets')">Quinielas</div>
    <div class="tab" onclick="switchTab('users')">Jugadores</div>
    <div class="tab" onclick="switchTab('leaderboard')">Tabla</div>
  </div>

  <!-- SHEETS -->
  <div class="tab-content active" id="tab-sheets">
    <div class="section-title">Nueva quiniela</div>
    <div class="card">
      <label>Nombre</label>
      <input type="text" id="sheet-name" placeholder="Ej: Fase de grupos A">
      <label style="margin-top:16px">Partidos</label>
      <div id="games-builder"></div>
      <button class="add-game-btn" onclick="addGameRow()">+ Agregar partido</button>
      <button class="btn btn-green" onclick="createSheet()">CREAR QUINIELA</button>
      <div class="msg" id="sheet-msg"></div>
    </div>

    <div class="section-title">Quinielas existentes</div>
    <div class="card" id="sheets-list"><div style="color:var(--muted);font-size:14px">Cargando...</div></div>
  </div>

  <!-- USERS -->
  <div class="tab-content" id="tab-users">
    <div class="section-title">Agregar jugador</div>
    <div class="card">
      <label>ID</label><input type="text" id="new-id" placeholder="Ej: 001">
      <label>Nombre</label><input type="text" id="new-name" placeholder="Nombre completo">
      <label>Contraseña</label><input type="password" id="new-pw" placeholder="••••••">
      <button class="btn btn-green" onclick="addUser()">AGREGAR</button>
      <div class="msg" id="user-msg"></div>
    </div>
    <div class="section-title">Jugadores</div>
    <div class="card"><div id="users-list">Cargando...</div></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="tab-content" id="tab-leaderboard">
    <div class="section-title">Clasificación</div>
    <div class="card"><div id="lb-list">Cargando...</div></div>
  </div>
</div>

<!-- Results modal -->
<div class="overlay" id="results-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="results-title">Resultados</div>
      <div class="close-btn" onclick="closeResults()">×</div>
    </div>
    <div id="results-body"></div>
    <button class="btn btn-green" onclick="saveResults()">GUARDAR</button>
    <div class="msg" id="results-msg"></div>
  </div>
</div>

<!-- Master sheet modal -->
<div class="overlay" id="master-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="master-title">Hoja maestra</div>
      <div class="close-btn" onclick="closeMaster()">×</div>
    </div>
    <div class="master-scroll"><div id="master-body"></div></div>
  </div>
</div>

<script>
  const SERVER_URL = "https://quiniela-server-production-183e.up.railway.app";
  let adminToken = localStorage.getItem('admin_token');
  let currentResultsSheetId = null, currentResultsSheet = null;

  if (adminToken) showApp();

  async function adminLogin() {
    const pw = document.getElementById('admin-pw').value;
    const err = document.getElementById('admin-err');
    err.style.display = 'none';
    const res = await fetch(`${SERVER_URL}/admin/login`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (!res.ok) { err.style.display = 'block'; return; }
    adminToken = data.token;
    localStorage.setItem('admin_token', adminToken);
    showApp();
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    loadSheets(); loadUsers(); addGameRow();
  }

  function adminLogout() { localStorage.removeItem('admin_token'); location.reload(); }
  const aHeaders = () => ({ 'Content-Type':'application/json', 'x-token': adminToken });

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    const tabs = ['sheets','users','leaderboard'];
    document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
    if (name === 'leaderboard') loadLeaderboard();
  }

  let gameCount = 0;
  function addGameRow() {
    gameCount++;
    const div = document.createElement('div');
    div.className = 'game-entry'; div.id = `gr-${gameCount}`;
    div.innerHTML = `<div class="game-entry-row">
      <input type="text" placeholder="Local" class="gh" data-gid="${gameCount}">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0">vs</span>
      <input type="text" placeholder="Visitante" class="ga" data-gid="${gameCount}">
      <button class="remove-game" onclick="removeGame(${gameCount})">×</button>
    </div>`;
    document.getElementById('games-builder').appendChild(div);
  }
  function removeGame(id) { const el = document.getElementById(`gr-${id}`); if (el) el.remove(); }

  async function createSheet() {
    const name = document.getElementById('sheet-name').value.trim();
    const msg = document.getElementById('sheet-msg');
    if (!name) { msg.textContent = 'Ponle nombre'; msg.className = 'msg err'; return; }
    const games = [];
    document.querySelectorAll('.game-entry').forEach(row => {
      const h = row.querySelector('.gh')?.value.trim();
      const a = row.querySelector('.ga')?.value.trim();
      if (h && a) games.push({ id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2), home: h, away: a });
    });
    if (!games.length) { msg.textContent = 'Agrega al menos un partido'; msg.className = 'msg err'; return; }
    const res = await fetch(`${SERVER_URL}/admin/sheet`, {
      method:'POST', headers: aHeaders(), body: JSON.stringify({ name, games })
    });
    if (res.ok) {
      msg.textContent = '✓ Quiniela creada'; msg.className = 'msg ok';
      document.getElementById('sheet-name').value = '';
      document.getElementById('games-builder').innerHTML = '';
      gameCount = 0; addGameRow(); loadSheets();
    } else { msg.textContent = 'Error'; msg.className = 'msg err'; }
  }

  async function loadSheets() {
    const res = await fetch(`${SERVER_URL}/admin/sheets`, { headers: aHeaders() });
    const sheets = await res.json();
    const el = document.getElementById('sheets-list');
    if (!sheets.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px">No hay quinielas aún</div>'; return; }
    el.innerHTML = sheets.map(s => `
      <div class="sheet-row">
        <div class="sheet-top">
          <div>
            <div class="sheet-name-admin">${s.name}</div>
            <div class="sheet-meta-admin">${s.gameCount} partidos</div>
          </div>
          <span class="badge ${s.open ? 'open' : 'closed'}">${s.open ? 'Abierto' : 'Cerrado'}</span>
        </div>
        <div class="sheet-actions">
          <button class="btn btn-sm btn-muted" onclick="viewMaster('${s.id}')">Ver hoja</button>
          <button class="btn btn-sm btn-yellow" onclick="openResults('${s.id}')">Resultados</button>
          ${s.open
            ? `<button class="btn btn-sm btn-muted" onclick="toggleSheet('${s.id}','close')">Cerrar</button>`
            : `<button class="btn btn-sm btn-green" onclick="toggleSheet('${s.id}','open')">Abrir</button>`}
          <button class="btn btn-sm btn-red" onclick="deleteSheet('${s.id}')">Eliminar</button>
        </div>
      </div>`).join('');
  }

  async function toggleSheet(id, action) {
    await fetch(`${SERVER_URL}/admin/sheet/${id}/${action}`, { method:'POST', headers: aHeaders() });
    loadSheets();
  }

  async function deleteSheet(id) {
    if (!confirm('¿Eliminar esta quiniela?')) return;
    await fetch(`${SERVER_URL}/admin/sheet/${id}`, { method:'DELETE', headers: aHeaders() });
    loadSheets();
  }

  async function openResults(id) {
    const res = await fetch(`${SERVER_URL}/admin/sheet/${id}/guesses`, { headers: aHeaders() });
    const data = await res.json();
    currentResultsSheetId = id; currentResultsSheet = data.sheet;
    document.getElementById('results-title').textContent = data.sheet.name;
    const existing = data.sheet.results || {};
    document.getElementById('results-body').innerHTML = data.sheet.games.map(g => {
      const ex = existing[g.id] || {};
      return `<div class="result-game">
        <div class="result-game-name"><span>${g.home}</span><span>${g.away}</span></div>
        <div class="result-scores">
          <input type="number" min="0" id="r_${g.id}_h" value="${ex.home ?? ''}" placeholder="0" inputmode="numeric">
          <span>–</span>
          <input type="number" min="0" id="r_${g.id}_a" value="${ex.away ?? ''}" placeholder="0" inputmode="numeric">
        </div>
      </div>`;
    }).join('');
    document.getElementById('results-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  async function saveResults() {
    const results = {};
    for (const g of currentResultsSheet.games) {
      const h = document.getElementById(`r_${g.id}_h`)?.value;
      const a = document.getElementById(`r_${g.id}_a`)?.value;
      if (h !== '' && a !== '') results[g.id] = { home: parseInt(h), away: parseInt(a) };
    }
    const res = await fetch(`${SERVER_URL}/admin/sheet/${currentResultsSheetId}/results`, {
      method:'POST', headers: aHeaders(), body: JSON.stringify({ results })
    });
    const msg = document.getElementById('results-msg');
    if (res.ok) { msg.textContent = '✓ Guardado'; msg.className = 'msg ok'; loadLeaderboard(); }
    else { msg.textContent = 'Error'; msg.className = 'msg err'; }
  }

  function closeResults() { document.getElementById('results-overlay').classList.remove('active'); document.body.style.overflow = ''; }

  async function viewMaster(id) {
    const res = await fetch(`${SERVER_URL}/admin/sheet/${id}/guesses`, { headers: aHeaders() });
    const { sheet, participants } = await res.json();
    document.getElementById('master-title').textContent = sheet.name;
    const results = sheet.results || {};
    let html = `<table><thead><tr><th>Jugador</th>${sheet.games.map(g => `<th>${g.home}<br>${g.away}</th>`).join('')}<th>Pts</th></tr></thead><tbody>`;
    participants.forEach(p => {
      let total = 0;
      const cells = sheet.games.map(g => {
        const guess = p.guesses[g.id], result = results[g.id];
        if (!guess) return '<td style="color:var(--muted)">—</td>';
        const gStr = `${guess.home}–${guess.away}`;
        let pts = 0, cls = 'pts-0';
        if (result) {
          const gW = guess.home > guess.away ? 'H' : guess.home < guess.away ? 'A' : 'D';
          const rW = result.home > result.away ? 'H' : result.home < result.away ? 'A' : 'D';
          if (guess.home == result.home && guess.away == result.away) { pts = 3; cls = 'pts-3'; }
          else if (gW === rW) { pts = 1; cls = 'pts-1'; }
          total += pts;
        }
        return `<td><div>${gStr}</div>${result ? `<div class="${cls}">${pts}p</div>` : ''}</td>`;
      }).join('');
      html += `<tr><td><strong>${p.name}</strong></td>${cells}<td class="${total > 0 ? 'pts-3' : ''}">${total}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('master-body').innerHTML = html;
    document.getElementById('master-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeMaster() { document.getElementById('master-overlay').classList.remove('active'); document.body.style.overflow = ''; }

  async function loadUsers() {
    const res = await fetch(`${SERVER_URL}/admin/users`, { headers: aHeaders() });
    const users = await res.json();
    const el = document.getElementById('users-list');
    if (!users.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px">No hay jugadores aún</div>'; return; }
    el.innerHTML = users.map(u => `
      <div class="user-row">
        <div><div class="user-name">${u.name}</div><div class="user-id">ID: ${u.id}</div></div>
        <button class="btn btn-sm btn-red" onclick="deleteUser('${u.id}')">Eliminar</button>
      </div>`).join('');
  }

  async function addUser() {
    const id = document.getElementById('new-id').value.trim();
    const name = document.getElementById('new-name').value.trim();
    const pw = document.getElementById('new-pw').value;
    const msg = document.getElementById('user-msg');
    if (!id || !name || !pw) { msg.textContent = 'Llena todos los campos'; msg.className = 'msg err'; return; }
    const res = await fetch(`${SERVER_URL}/admin/user`, {
      method:'POST', headers: aHeaders(), body: JSON.stringify({ id, name, password: pw })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = '✓ Jugador agregado'; msg.className = 'msg ok';
      document.getElementById('new-id').value = '';
      document.getElementById('new-name').value = '';
      document.getElementById('new-pw').value = '';
      loadUsers();
    } else { msg.textContent = data.error || 'Error'; msg.className = 'msg err'; }
  }

  async function deleteUser(id) {
    if (!confirm(`¿Eliminar a ${id}?`)) return;
    await fetch(`${SERVER_URL}/admin/user/${id}`, { method:'DELETE', headers: aHeaders() });
    loadUsers();
  }

  async function loadLeaderboard() {
    const res = await fetch(`${SERVER_URL}/admin/leaderboard`, { headers: aHeaders() });
    const data = await res.json();
    const el = document.getElementById('lb-list');
    const medals = ['🥇','🥈','🥉'];
    if (!data.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px">Aún no hay puntos</div>'; return; }
    el.innerHTML = data.map((p, i) => `
      <div class="lb-row">
        <div class="lb-rank">${medals[i] || (i+1)}</div>
        <div><div style="font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--muted)">${p.id}</div></div>
        <div class="lb-pts">${p.points}<span style="font-size:11px;font-family:Barlow;color:var(--muted)"> pts</span></div>
      </div>`).join('');
  }

  document.getElementById('admin-pw')?.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
</script>
</body>
</html>
