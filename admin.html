<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --dark: #0a0f0a;
    --card: #111a11;
    --border: #1e2e1e;
    --text: #e8f5e9;
    --muted: #5a7a5a;
    --red: #ff5252;
    --yellow: #ffd500;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 60px; }

  /* Login screen */
  #login-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
    background-image: radial-gradient(ellipse at 50% 50%, rgba(0,200,83,0.06) 0%, transparent 70%);
  }
  .admin-logo { font-family: 'Bebas Neue', sans-serif; font-size: 60px; color: var(--green); letter-spacing: 4px; margin-bottom: 4px; }
  .admin-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 36px; }

  /* Main app */
  #app-screen { display: none; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--green); letter-spacing: 3px; }
  .logout { font-size: 12px; color: var(--muted); cursor: pointer; }
  .logout:hover { color: var(--red); }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; }
  .tab {
    padding: 14px 18px; font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.2s;
  }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-content { display: none; padding: 24px; max-width: 700px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* Common UI */
  .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 12px; }
  label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  input, select {
    width: 100%; background: var(--dark); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px; color: var(--text);
    font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--green); }
  .row { display: flex; gap: 10px; }
  .row input { flex: 1; }
  .btn {
    padding: 11px 18px; border: none; border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-green { background: var(--green); color: #000; }
  .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-muted { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-yellow { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); }
  .msg { font-size: 13px; margin-top: 10px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }

  /* User list */
  .user-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .user-row:last-child { border-bottom: none; }
  .user-name { font-weight: 600; }
  .user-id { font-size: 12px; color: var(--muted); }

  /* Sheet list */
  .sheet-row {
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .sheet-row:last-child { border-bottom: none; }
  .sheet-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .sheet-name-admin { font-weight: 600; }
  .sheet-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
  .badge.open { background: rgba(0,200,83,0.15); color: var(--green); }
  .badge.closed { background: rgba(255,82,82,0.1); color: var(--red); }

  /* Games builder */
  #games-builder { margin-top: 16px; }
  .game-entry {
    display: grid; grid-template-columns: 1fr 60px 1fr 32px;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .remove-game {
    background: none; border: none; color: var(--red);
    font-size: 18px; cursor: pointer; text-align: center; padding: 0;
  }
  .add-game-btn {
    background: none; border: 1px dashed var(--border); border-radius: 6px;
    color: var(--muted); padding: 10px; width: 100%; cursor: pointer;
    font-family: 'Barlow', sans-serif; font-size: 13px; margin-top: 4px;
    transition: border-color 0.2s, color 0.2s;
  }
  .add-game-btn:hover { border-color: var(--green); color: var(--green); }

  /* Results entry */
  .result-entry {
    display: grid; grid-template-columns: 1fr 50px 12px 50px;
    gap: 8px; align-items: center; margin-bottom: 10px; font-size: 14px;
  }
  .result-entry input { text-align: center; }

  /* Master sheet table */
  .master-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; overflow-x: auto; display: block; }
  .master-table th { text-align: left; color: var(--muted); font-weight: 400; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .master-table td { padding: 10px; border-bottom: 1px solid var(--border); }
  .master-table tr:last-child td { border-bottom: none; }
  .pts-cell { font-family: 'Bebas Neue', sans-serif; font-size: 18px; }
  .pts-3 { color: var(--green); }
  .pts-1 { color: var(--yellow); }
  .pts-0 { color: var(--muted); }

  /* Leaderboard admin */
  .lb-admin-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .lb-admin-row:last-child { border-bottom: none; }
  .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 22px; width: 30px; }
  .lb-pts-big { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--green); margin-left: auto; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 24px; }
  .overlay.active { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; margin: auto; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; }
  .close-btn { font-size: 24px; cursor: pointer; color: var(--muted); }
  .close-btn:hover { color: var(--text); }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="admin-logo">ADMIN</div>
  <div class="admin-sub">Quiniela Mundial 2026</div>
  <div class="card" style="max-width:340px;width:100%">
    <label>Contraseña admin</label>
    <input type="password" id="admin-pw" placeholder="••••••••">
    <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="adminLogin()">ENTRAR</button>
    <div class="msg err" id="admin-err" style="display:none">Contraseña incorrecta</div>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <header>
    <div class="logo">QUINIELA — ADMIN</div>
    <div class="logout" onclick="adminLogout()">SALIR</div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('sheets')">Quinielas</div>
    <div class="tab" onclick="switchTab('users')">Participantes</div>
    <div class="tab" onclick="switchTab('leaderboard')">Tabla</div>
  </div>

  <!-- SHEETS TAB -->
  <div class="tab-content active" id="tab-sheets">
    <div class="section-title">Crear nueva quiniela</div>
    <div class="card">
      <label>Nombre de la quiniela</label>
      <input type="text" id="sheet-name" placeholder="Ej: Fase de grupos A">
      <label style="margin-top:16px">Partidos</label>
      <div id="games-builder"></div>
      <button class="add-game-btn" onclick="addGameRow()">+ Agregar partido</button>
      <button class="btn btn-green" style="margin-top:16px" onclick="createSheet()">CREAR QUINIELA</button>
      <div class="msg" id="sheet-msg"></div>
    </div>

    <div class="section-title" style="margin-top:24px">Quinielas existentes</div>
    <div id="sheets-list"><div style="color:var(--muted);font-size:14px">Cargando...</div></div>
  </div>

  <!-- USERS TAB -->
  <div class="tab-content" id="tab-users">
    <div class="section-title">Agregar participante</div>
    <div class="card">
      <div class="row">
        <div style="flex:1"><label>ID</label><input type="text" id="new-id" placeholder="Ej: 001"></div>
        <div style="flex:2"><label>Nombre</label><input type="text" id="new-name" placeholder="Nombre completo"></div>
        <div style="flex:1"><label>Contraseña</label><input type="password" id="new-pw" placeholder="••••••"></div>
      </div>
      <button class="btn btn-green" style="margin-top:14px" onclick="addUser()">AGREGAR</button>
      <div class="msg" id="user-msg"></div>
    </div>
    <div class="section-title" style="margin-top:24px">Participantes</div>
    <div class="card"><div id="users-list">Cargando...</div></div>
  </div>

  <!-- LEADERBOARD TAB -->
  <div class="tab-content" id="tab-leaderboard">
    <div class="section-title">Clasificación general</div>
    <div class="card"><div id="lb-list">Cargando...</div></div>
  </div>
</div>

<!-- Results modal -->
<div class="overlay" id="results-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="results-title">Ingresar resultados</div>
      <div class="close-btn" onclick="closeResults()">×</div>
    </div>
    <div id="results-body"></div>
    <button class="btn btn-green" style="width:100%;margin-top:16px" onclick="saveResults()">GUARDAR RESULTADOS</button>
    <div class="msg" id="results-msg"></div>
  </div>
</div>

<!-- Master sheet modal -->
<div class="overlay" id="master-overlay">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <div class="modal-title" id="master-title">Hoja maestra</div>
      <div class="close-btn" onclick="closeMaster()">×</div>
    </div>
    <div id="master-body" style="overflow-x:auto"></div>
  </div>
</div>

<script>
  const SERVER_URL = "https://quiniela-server-production-183e.up.railway.app";
  let adminToken = localStorage.getItem('admin_token');
  let currentResultsSheetId = null;
  let currentResultsSheet = null;

  // ── Auth ──
  if (adminToken) showApp();

  async function adminLogin() {
    const pw = document.getElementById('admin-pw').value;
    const err = document.getElementById('admin-err');
    err.style.display = 'none';
    const res = await fetch(`${SERVER_URL}/admin/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (!res.ok) { err.style.display = 'block'; return; }
    adminToken = data.token;
    localStorage.setItem('admin_token', adminToken);
    showApp();
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    loadSheets();
    loadUsers();
    loadLeaderboard();
    addGameRow();
  }

  function adminLogout() {
    localStorage.removeItem('admin_token');
    adminToken = null;
    location.reload();
  }

  const aHeaders = () => ({ 'Content-Type':'application/json', 'x-token': adminToken });

  // ── Tabs ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    const tabs = ['sheets','users','leaderboard'];
    document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
    if (name === 'leaderboard') loadLeaderboard();
  }

  // ── Games builder ──
  let gameCount = 0;
  function addGameRow() {
    gameCount++;
    const div = document.createElement('div');
    div.className = 'game-entry';
    div.id = `gr-${gameCount}`;
    div.innerHTML = `
      <input type="text" placeholder="Local" class="gh" data-gid="${gameCount}">
      <div style="text-align:center;color:var(--muted);font-size:12px">vs</div>
      <input type="text" placeholder="Visitante" class="ga" data-gid="${gameCount}">
      <button class="remove-game" onclick="removeGame(${gameCount})">×</button>`;
    document.getElementById('games-builder').appendChild(div);
  }

  function removeGame(id) {
    const el = document.getElementById(`gr-${id}`);
    if (el) el.remove();
  }

  // ── Sheets ──
  async function createSheet() {
    const name = document.getElementById('sheet-name').value.trim();
    const msg = document.getElementById('sheet-msg');
    if (!name) { msg.textContent = 'Ponle nombre a la quiniela'; msg.className = 'msg err'; return; }
    const games = [];
    document.querySelectorAll('.game-entry').forEach(row => {
      const h = row.querySelector('.gh')?.value.trim();
      const a = row.querySelector('.ga')?.value.trim();
      if (h && a) games.push({ id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2), home: h, away: a });
    });
    if (!games.length) { msg.textContent = 'Agrega al menos un partido'; msg.className = 'msg err'; return; }
    const res = await fetch(`${SERVER_URL}/admin/sheet`, {
      method:'POST', headers: aHeaders(), body: JSON.stringify({ name, games })
    });
    if (res.ok) {
      msg.textContent = '✓ Quiniela creada'; msg.className = 'msg ok';
      document.getElementById('sheet-name').value = '';
      document.getElementById('games-builder').innerHTML = '';
      gameCount = 0; addGameRow();
      loadSheets();
    } else { msg.textContent = 'Error al crear'; msg.className = 'msg err'; }
  }

  async function loadSheets() {
    const res = await fetch(`${SERVER_URL}/admin/sheets`, { headers: aHeaders() });
    const sheets = await res.json();
    const el = document.getElementById('sheets-list');
    if (!sheets.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px">No hay quinielas aún</div>'; return; }
    el.innerHTML = '<div class="card">' + sheets.map(s => `
      <div class="sheet-row">
        <div class="sheet-top">
          <div>
            <div class="sheet-name-admin">${s.name}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px">${s.gameCount} partidos</div>
          </div>
          <span class="badge ${s.open ? 'open' : 'closed'}">${s.open ? 'Abierto' : 'Cerrado'}</span>
        </div>
        <div class="sheet-actions" style="margin-top:10px">
          <button class="btn btn-sm btn-muted" onclick="viewMaster('${s.id}')">Ver hoja</button>
          <button class="btn btn-sm btn-yellow" onclick="openResults('${s.id}')">Resultados</button>
          ${s.open
            ? `<button class="btn btn-sm btn-muted" onclick="toggleSheet('${s.id}','close')">Cerrar</button>`
            : `<button class="btn btn-sm btn-green" onclick="toggleSheet('${s.id}','open')">Abrir</button>`
          }
          <button class="btn btn-sm btn-red" onclick="deleteSheet('${s.id}')">Eliminar</button>
        </div>
      </div>`).join('') + '</div>';
  }

  async function toggleSheet(id, action) {
    await fetch(`${SERVER_URL}/admin/sheet/${id}/${action}`, { method:'POST', headers: aHeaders() });
    loadSheets();
  }

  async function deleteSheet(id) {
    if (!confirm('¿Eliminar esta quiniela?')) return;
    await fetch(`${SERVER_URL}/admin/sheet/${id}`, { method:'DELETE', headers: aHeaders() });
    loadSheets();
  }

  // ── Results ──
  async function openResults(id) {
    const res = await fetch(`${SERVER_URL}/admin/sheet/${id}/guesses`, { headers: aHeaders() });
    const data = await res.json();
    currentResultsSheetId = id;
    currentResultsSheet = data.sheet;
    document.getElementById('results-title').textContent = `Resultados: ${data.sheet.name}`;
    const existing = data.sheet.results || {};
    document.getElementById('results-body').innerHTML = data.sheet.games.map(g => {
      const ex = existing[g.id] || {};
      return `<div style="margin-bottom:4px;font-size:13px;color:var(--muted)">${g.home} vs ${g.away}</div>
        <div class="result-entry">
          <div style="font-size:13px">${g.home} – ${g.away}</div>
          <input type="number" min="0" id="r_${g.id}_h" value="${ex.home ?? ''}" placeholder="0" style="text-align:center">
          <div style="text-align:center;color:var(--muted)">–</div>
          <input type="number" min="0" id="r_${g.id}_a" value="${ex.away ?? ''}" placeholder="0" style="text-align:center">
        </div>`;
    }).join('');
    document.getElementById('results-overlay').classList.add('active');
  }

  async function saveResults() {
    const msg = document.getElementById('results-msg');
    const results = {};
    for (const g of currentResultsSheet.games) {
      const h = document.getElementById(`r_${g.id}_h`)?.value;
      const a = document.getElementById(`r_${g.id}_a`)?.value;
      if (h !== '' && a !== '') results[g.id] = { home: parseInt(h), away: parseInt(a) };
    }
    const res = await fetch(`${SERVER_URL}/admin/sheet/${currentResultsSheetId}/results`, {
      method:'POST', headers: aHeaders(), body: JSON.stringify({ results })
    });
    if (res.ok) { msg.textContent = '✓ Resultados guardados'; msg.className = 'msg ok'; loadLeaderboard(); }
    else { msg.textContent = 'Error'; msg.className = 'msg err'; }
  }

  function closeResults() { document.getElementById('results-overlay').classList.remove('active'); }

  // ── Master sheet ──
  async function viewMaster(id) {
    const res = await fetch(`${SERVER_URL}/admin/sheet/${id}/guesses`, { headers: aHeaders() });
    const data = await res.json();
    const { sheet, participants } = data;
    document.getElementById('master-title').textContent = sheet.name;

    let html = `<table class="master-table"><thead><tr>
      <th>Participante</th>
      ${sheet.games.map(g => `<th>${g.home}<br>${g.away}</th>`).join('')}
      <th>Total</th>
    </tr></thead><tbody>`;

    const results = sheet.results || {};
    participants.forEach(p => {
      let total = 0;
      const cells = sheet.games.map(g => {
        const guess = p.guesses[g.id];
        const result = results[g.id];
        if (!guess) return '<td style="color:var(--muted)">—</td>';
        const gStr = `${guess.home}–${guess.away}`;
        let pts = 0, cls = 'pts-0';
        if (result) {
          const gW = guess.home > guess.away ? 'H' : guess.home < guess.away ? 'A' : 'D';
          const rW = result.home > result.away ? 'H' : result.home < result.away ? 'A' : 'D';
          if (guess.home == result.home && guess.away == result.away) { pts = 3; cls = 'pts-3'; }
          else if (gW === rW) { pts = 1; cls = 'pts-1'; }
          total += pts;
        }
        return `<td><div>${gStr}</div>${result ? `<div class="pts-cell ${cls}">${pts}p</div>` : ''}</td>`;
      }).join('');
      html += `<tr><td><strong>${p.name}</strong><br><span style="font-size:11px;color:var(--muted)">${p.userId}</span></td>${cells}<td class="pts-cell ${total >= 6 ? 'pts-3' : total >= 3 ? 'pts-1' : ''}">${total}</td></tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('master-body').innerHTML = html;
    document.getElementById('master-overlay').classList.add('active');
  }

  function closeMaster() { document.getElementById('master-overlay').classList.remove('active'); }

  // ── Users ──
  async function loadUsers() {
    const res = await fetch(`${SERVER_URL}/admin/users`, { headers: aHeaders() });
    const users = await res.json();
    const el = document.getElementById('users-list');
    if (!users.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px">No hay participantes aún</div>'; return; }
    el.innerHTML = users.map(u => `
      <div class="user-row">
        <div><div class="user-name">${u.name}</div><div class="user-id">ID: ${u.id}</div></div>
        <button class="btn btn-sm btn-red" onclick="deleteUser('${u.id}')">Eliminar</button>
      </div>`).join('');
  }

  async function addUser() {
    const id = document.getElementById('new-id').value.trim();
    const name = document.getElementById('new-name').value.trim();
    const pw = document.getElementById('new-pw').value;
    const msg = document.getElementById('user-msg');
    if (!id || !name || !pw) { msg.textContent = 'Llena todos los campos'; msg.className = 'msg err'; return; }
    const res = await fetch(`${SERVER_URL}/admin/user`, {
      method:'POST', headers: aHeaders(), body: JSON.stringify({ id, name, password: pw })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = '✓ Participante agregado'; msg.className = 'msg ok';
      document.getElementById('new-id').value = '';
      document.getElementById('new-name').value = '';
      document.getElementById('new-pw').value = '';
      loadUsers();
    } else { msg.textContent = data.error || 'Error'; msg.className = 'msg err'; }
  }

  async function deleteUser(id) {
    if (!confirm(`¿Eliminar al participante ${id}?`)) return;
    await fetch(`${SERVER_URL}/admin/user/${id}`, { method:'DELETE', headers: aHeaders() });
    loadUsers();
  }

  // ── Leaderboard ──
  async function loadLeaderboard() {
    const res = await fetch(`${SERVER_URL}/admin/leaderboard`, { headers: aHeaders() });
    const data = await res.json();
    const el = document.getElementById('lb-list');
    const medals = ['🥇','🥈','🥉'];
    if (!data.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px">Aún no hay puntos</div>'; return; }
    el.innerHTML = data.map((p, i) => `
      <div class="lb-admin-row">
        <div class="lb-rank">${medals[i] || (i+1)}</div>
        <div>${p.name}<div style="font-size:11px;color:var(--muted)">${p.id}</div></div>
        <div class="lb-pts-big">${p.points}<span style="font-size:11px;font-family:Barlow;color:var(--muted)">pts</span></div>
      </div>`).join('');
  }

  document.getElementById('admin-pw')?.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
</script>
</body>
</html>
