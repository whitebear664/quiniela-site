<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiniela – Tabla</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --dark: #0a0f0a; --card: #111a11;
    --border: #1e2e1e; --text: #e8f5e9; --muted: #5a7a5a;
    --red: #ff5252; --yellow: #ffd500;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* Portrait lock */
  .rotate-msg {
    display: none; position: fixed; inset: 0; background: var(--dark);
    z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Barlow', sans-serif; color: var(--muted); text-align: center; padding: 40px;
  }
  .rotate-msg .icon { font-size: 60px; margin-bottom: 16px; }
  .rotate-msg p { font-size: 16px; letter-spacing: 1px; }
  @media (orientation: landscape) {
    .rotate-msg { display: flex; }
    body > *:not(.rotate-msg) { display: none !important; }
  }

  body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--dark); z-index: 10;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--green); letter-spacing: 3px; }
  .back-btn { font-size: 13px; color: var(--muted); cursor: pointer; padding: 8px; text-decoration: none; }

  main { padding: 20px; }
  .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; text-align: center; }

  /* Player card */
  .player-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 12px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .player-card.expanded { border-color: var(--green); }

  .player-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; cursor: pointer;
  }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 28px; width: 36px; text-align: center; flex-shrink: 0; }
  .rank-1 { color: #FFD700; }
  .rank-2 { color: #C0C0C0; }
  .rank-3 { color: #CD7F32; }
  .player-name { flex: 1; font-weight: 600; font-size: 18px; }
  .player-pts { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--green); }
  .player-pts-label { font-size: 11px; color: var(--muted); }
  .chevron { font-size: 18px; color: var(--muted); transition: transform 0.25s; flex-shrink: 0; }
  .player-card.expanded .chevron { transform: rotate(180deg); }

  /* Picks panel */
  .picks-panel { display: none; border-top: 1px solid var(--border); padding: 16px 18px 20px; }
  .player-card.expanded .picks-panel { display: block; }

  .sheet-section { margin-bottom: 20px; }
  .sheet-section:last-child { margin-bottom: 0; }
  .sheet-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .pick-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px;
  }
  .pick-row:last-child { border-bottom: none; }
  .pick-teams { font-size: 13px; font-weight: 600; flex: 1; }
  .pick-teams .away { font-weight: 400; color: var(--muted); }
  .pick-score { font-family: 'Bebas Neue', sans-serif; font-size: 18px; padding: 4px 10px; border-radius: 6px; background: #1a2a1a; min-width: 52px; text-align: center; }
  .pick-result { font-family: 'Bebas Neue', sans-serif; font-size: 18px; padding: 4px 10px; border-radius: 6px; background: rgba(0,200,83,0.1); color: var(--green); min-width: 52px; text-align: center; }
  .pts-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .pts-dot.p3 { background: rgba(0,200,83,0.2); color: var(--green); }
  .pts-dot.p1 { background: rgba(255,213,0,0.15); color: var(--yellow); }
  .pts-dot.p0 { background: rgba(255,82,82,0.08); color: var(--muted); }
  .no-picks { color: var(--muted); font-size: 13px; text-align: center; padding: 10px 0; }

  .pool-center { text-align: center; padding: 4px 0 0; }
  .pool-amount-big { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: #ffd500; line-height: 1; letter-spacing: 2px; animation: premioGlow 1.5s ease-in-out infinite; }
  @keyframes premioGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(255,213,0,0.6), 0 0 20px rgba(255,213,0,0.3); color: #ffd500; }
    50% { text-shadow: 0 0 20px #ffd500, 0 0 40px #ffd500, 0 0 80px rgba(255,213,0,0.8); color: #fff176; }
  }
  .pl { display: inline-block; color: #5a7a5a; animation: letterGlow 2.7s ease-in-out infinite; animation-delay: calc(var(--i) * 0.18s); }
  @keyframes letterGlow {
    0%, 100% { color: #5a7a5a; text-shadow: none; }
    30% { color: #ffe066; text-shadow: 0 0 8px rgba(255,213,0,0.5); }
    50% { color: #ffd500; text-shadow: 0 0 14px rgba(255,213,0,0.9), 0 0 28px rgba(255,213,0,0.4); }
    70% { color: #ffe066; text-shadow: 0 0 8px rgba(255,213,0,0.5); }
  }
  .pool-label-sm { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .loading { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }

  /* Medals for top 3 */
  .medal { font-size: 22px; }
</style>
</head>
<body>

<div class="rotate-msg">
  <div class="icon">📱</div>
  <p>Gira tu celular a<br>modo vertical</p>
</div>

<header>
  <div class="logo">TABLA</div>
  <div class="pool-center">
    <div class="pool-amount-big" id="pool-amount">$—</div>
    <div class="pool-label-sm"><span class="pl" style="--i:0">E</span><span class="pl" style="--i:1">L</span>&nbsp;<span class="pl" style="--i:2">P</span><span class="pl" style="--i:3">R</span><span class="pl" style="--i:4">E</span><span class="pl" style="--i:5">M</span><span class="pl" style="--i:6">I</span><span class="pl" style="--i:7">O</span></div>
  </div>
  <a href="home.html" class="back-btn">← Volver</a>
</header>

<main>
  <div class="section-title">🏆 Clasificación general</div>
  <div id="players-list"><div class="loading">Cargando...</div></div>
</main>

<script>
  const SERVER_URL = "https://quiniela-server-production-183e.up.railway.app";
  const medals = ['🥇','🥈','🥉'];

  function calcPoints(guess, result) {
    if (!guess || !result) return null;
    const gH = parseInt(guess.home), gA = parseInt(guess.away);
    const rH = parseInt(result.home), rA = parseInt(result.away);
    if (gH === rH && gA === rA) return 3;
    const gW = gH > gA ? 'H' : gH < gA ? 'A' : 'D';
    const rW = rH > rA ? 'H' : rH < rA ? 'A' : 'D';
    return gW === rW ? 1 : 0;
  }

  function toggle(id) {
    const card = document.getElementById(`card-${id}`);
    card.classList.toggle('expanded');
  }

  async function load() {
    try {
      const res = await fetch(`${SERVER_URL}/standings`);
      const players = await res.json();
      const el = document.getElementById('players-list');
      if (!players.length) { el.innerHTML = '<div class="empty">Aún no hay jugadores</div>'; return; }

      el.innerHTML = players.map((p, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        const rankDisplay = medals[i] || (i + 1);

        // Build picks HTML
        const sheetKeys = Object.keys(p.sheets);
        let picksHtml = '';
        if (!sheetKeys.length) {
          picksHtml = '<div class="no-picks">Sin pronósticos enviados aún</div>';
        } else {
          picksHtml = sheetKeys.map(sid => {
            const s = p.sheets[sid];
            const gameRows = s.games.map(g => {
              const guess = g.guess;
              const result = g.result;
              const pts = guess ? calcPoints(guess, result) : null;
              const guessStr = guess ? `${guess.home}–${guess.away}` : '–';
              const resultStr = result ? `${result.home}–${result.away}` : '?';
              const dotClass = pts === 3 ? 'p3' : pts === 1 ? 'p1' : pts === 0 ? 'p0' : '';
              const dotLabel = pts !== null ? `${pts}` : '';
              return `<div class="pick-row">
                <div class="pick-teams">${g.home} <span class="away">vs ${g.away}</span></div>
                <div class="pick-score">${guessStr}</div>
                ${result ? `<div class="pick-result">${resultStr}</div>` : ''}
                ${pts !== null ? `<div class="pts-dot ${dotClass}">${dotLabel}</div>` : ''}
              </div>`;
            }).join('');
            return `<div class="sheet-section">
              <div class="sheet-label">${s.sheetName}</div>
              ${gameRows}
            </div>`;
          }).join('');
        }

        return `<div class="player-card" id="card-${p.id}" onclick="toggle('${p.id}')">
          <div class="player-header">
            <div class="rank ${rankClass}">${rankDisplay}</div>
            <div class="player-name">${p.name}</div>
            <div style="text-align:right">
              <div class="player-pts">${p.points}</div>
              <div class="player-pts-label">pts</div>
            </div>
            <div class="chevron">▼</div>
          </div>
          <div class="picks-panel">${picksHtml}</div>
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('players-list').innerHTML = '<div class="empty">Error de conexión</div>';
    }
  }

  async function loadPool() {
    try {
      const res = await fetch(`${SERVER_URL}/standings`);
      const players = await res.json();
      document.getElementById('pool-amount').textContent = `$${players.length * 50}`;
    } catch(e) {}
  }

  load();
  loadPool();
  setInterval(load, 30000);
  setInterval(loadPool, 30000);
</script>
</body>
</html>
